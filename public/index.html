      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

<body>
  <h1>csv-agent</h1>

    web UI yet.
  </p>
  <pre>node agent.js data/transactions.csv "What did I spend most on?"</pre>

    for setup instructions.
